<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Machine Learning — Definição</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#060a14;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1rem}

.card{
  position:relative;
  width:100%;
  max-width:720px;
  aspect-ratio:16/9;
  border-radius:18px;
  overflow:hidden;
  background:#0a0f1e;
  box-shadow:0 0 80px rgba(60,100,255,.1),0 0 160px rgba(200,100,40,.06)
}

/* Layered atmospheric background */
.bg{position:absolute;inset:0;z-index:0}

.bg .layer1{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse at 15% 50%, rgba(30,80,200,.25) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 30%, rgba(255,140,40,.18) 0%, transparent 50%),
    radial-gradient(ellipse at 60% 80%, rgba(180,60,200,.08) 0%, transparent 40%),
    linear-gradient(145deg, #080d1f 0%, #0f1830 35%, #1a1228 60%, #1f1510 100%)
}

.bg .layer2{
  position:absolute;inset:0;
  background:
    radial-gradient(circle at 75% 25%, rgba(255,180,60,.12) 0%, transparent 30%),
    radial-gradient(circle at 80% 40%, rgba(255,100,30,.08) 0%, transparent 25%)
}

/* Grid/matrix overlay */
.bg .grid{
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(100,160,255,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(100,160,255,.03) 1px, transparent 1px);
  background-size:40px 40px
}

/* Floating particles effect via pseudo-elements */
.bg .dots{position:absolute;inset:0}
.bg .dots::before{
  content:'';position:absolute;
  width:3px;height:3px;border-radius:50%;
  top:20%;left:70%;
  background:rgba(255,180,80,.5);
  box-shadow:
    30px -15px 0 rgba(255,160,60,.4),
    -20px 30px 0 rgba(255,140,50,.3),
    60px 20px 0 rgba(255,200,100,.35),
    -40px -10px 0 rgba(100,160,255,.3),
    80px 40px 0 rgba(255,120,40,.25),
    15px 55px 0 rgba(255,180,80,.3),
    -60px 15px 0 rgba(80,140,255,.25),
    45px -35px 0 rgba(255,150,50,.35),
    -15px 60px 0 rgba(200,120,255,.2),
    70px -25px 0 rgba(255,170,60,.3),
    100px 10px 0 rgba(255,200,80,.2),
    -30px 45px 0 rgba(120,160,255,.2)
}
.bg .dots::after{
  content:'';position:absolute;
  width:2px;height:2px;border-radius:50%;
  top:55%;left:25%;
  background:rgba(80,140,255,.4);
  box-shadow:
    20px 10px 0 rgba(100,160,255,.3),
    -15px -20px 0 rgba(120,180,255,.25),
    40px -5px 0 rgba(80,130,255,.2),
    -30px 25px 0 rgba(150,140,255,.2),
    50px 30px 0 rgba(100,200,255,.15)
}

/* Content */
.content{
  position:relative;z-index:1;
  display:flex;flex-direction:column;
  justify-content:center;
  height:100%;
  padding:2.5rem 3rem;
}
@media(max-width:550px){.content{padding:1.5rem 1.5rem}}

.title{
  font-family:Georgia,serif;
  font-size:clamp(.85rem,2vw,1.05rem);
  font-weight:400;
  color:rgba(255,255,255,.5);
  margin-bottom:.3rem;
  letter-spacing:.03em
}

.phrase{
  font-size:clamp(1rem,2.6vw,1.3rem);
  line-height:2.4;
  color:rgba(255,255,255,.92);
  font-weight:400;
  max-width:580px
}

.phrase b{
  color:#fff;
  font-weight:700
}

.blank{
  display:inline-block;
  min-width:110px;
  height:1.6em;
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.25);
  border-radius:6px;
  vertical-align:middle;
  margin:0 .15em;
  position:relative;
  top:-1px
}

.blank.lg{min-width:150px}
.blank.sm{min-width:80px}

/* Bottom corner badge */
.corner{
  position:absolute;
  bottom:1rem;right:1.5rem;
  font-size:.6rem;
  color:rgba(255,255,255,.25);
  letter-spacing:.08em;
  text-transform:uppercase;
  z-index:1
}
</style>
</head>
<body>

<div class="card">
  <div class="bg">
    <div class="layer1"></div>
    <div class="layer2"></div>
    <div class="grid"></div>
    <div class="dots"></div>
  </div>
  <div class="content">
    <div class="title">Machine Learning</div>
    <div class="phrase">
      <b>Machine Learning</b> é uma abordagem para
      <span class="blank lg"></span>
      padrões
      <span class="blank"></span>
      a partir de
      <span class="blank"></span>
      existentes e usar esses padrões para fazer
      <span class="blank lg"></span>
      sobre dados ainda não
      <span class="blank"></span>.
    </div>
  </div>
  <div class="corner">Módulo 1 · Introdução à IA</div>
</div>

</body>
</html>
